<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ช่วยเหลือกาญ — แอดมิน</title>
<style>
  :root{
    --green:#1f9e6e;--green-d:#157a54;--blue:#2540c8;--red:#e8412c;--red-d:#c32e1c;
    --ink:#1a2233;--muted:#6b7384;--line:#e6e9f0;--bg:#eef1f6;--card:#fff;
    --amber:#d98200;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"Helvetica Neue","Sukhumvit Set","Thonburi",sans-serif;background:var(--bg);color:var(--ink);max-width:760px;margin:0 auto;padding-bottom:40px}
  .hidden{display:none!important}
  header{background:var(--green-d);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:30}
  header h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  header .sub{font-size:12px;opacity:.85;margin-top:2px}
  .tabs{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:62px;z-index:20}
  .tabs button{flex:1;border:none;background:none;padding:14px;font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.active{color:var(--green-d);border-bottom-color:var(--green)}
  .tabs button .badge{display:inline-block;background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:5px;vertical-align:middle}
  .wrap{padding:16px}
  .cfgnotice{background:#fff8e1;border:1px solid #ffe082;color:#8a6d00;border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.5}
  /* SOS cards */
  .sos-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(20,30,60,.05)}
  .sos-card.pending{border-left:5px solid var(--red)}
  .sos-card.accepted{border-left:5px solid var(--amber)}
  .sos-card.enroute{border-left:5px solid var(--blue)}
  .sos-card.arrived{border-left:5px solid #7c4dff}
  .sos-card.done{border-left:5px solid var(--green);opacity:.7}
  .sos-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .sos-code{font-weight:800;font-size:16px}
  .sos-time{font-size:12px;color:var(--muted);margin-top:2px}
  .pill{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .pill.pending{background:#ffe7e3;color:var(--red-d)}
  .pill.accepted{background:#fff1dc;color:var(--amber)}
  .pill.enroute{background:#e7ecff;color:var(--blue)}
  .pill.arrived{background:#efe7ff;color:#5e34d6}
  .pill.done{background:#e3f6ed;color:var(--green-d)}
  .sos-meta{font-size:13px;color:#445;line-height:1.7;margin-bottom:12px}
  .sos-meta a{color:var(--blue);text-decoration:none;font-weight:600}
  .status-row{display:flex;flex-wrap:wrap;gap:8px}
  .status-row button{border:1px solid var(--line);background:#fafbfd;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
  .status-row button:hover{background:#f0f2f7}
  .status-row button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .note-input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:13px;margin-top:10px;font-family:inherit}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}
  /* services admin */
  .filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px}
  .filter-bar button{flex:none;border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
  .filter-bar button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  .svc-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
  .svc-card .top{display:flex;align-items:center;gap:10px}
  .svc-card .ico{font-size:22px}
  .svc-card .lbl{font-weight:700;flex:1}
  .svc-card .desc{font-size:13px;color:var(--muted);margin-top:4px}
  .svc-card .ph{font-size:13px;color:var(--blue);margin-top:4px}
  .svc-actions{display:flex;gap:8px;margin-top:10px}
  .btn{border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .btn.edit{background:#eaf0ff;color:var(--blue)}
  .btn.del{background:#ffeae6;color:var(--red-d)}
  .btn.add{background:var(--green);color:#fff;width:100%;padding:14px;font-size:15px;margin-bottom:16px}
  .btn.save{background:var(--green);color:#fff;flex:1}
  .btn.cancel{background:#eef1f6;color:var(--ink);flex:1}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(15,20,40,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .modal-box{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:760px;padding:20px;max-height:88vh;overflow-y:auto}
  .modal-box h3{font-size:17px;margin-bottom:14px}
  .modal-box label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin:10px 0 4px}
  .modal-box input,.modal-box select{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px;font-size:15px;font-family:inherit}
  .modal-foot{display:flex;gap:10px;margin-top:18px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2233;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s}
  .toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <h1>🛟 ช่วยเหลือกาญ — ศูนย์แอดมิน</h1>
  <div class="sub">รับแจ้งเหตุ SOS · จัดการข้อมูลบริการ</div>
</header>

<div class="tabs">
  <button id="tabSos" class="active" onclick="switchTab('sos')">🆘 เหตุ SOS <span class="badge hidden" id="sosBadge">0</span></button>
  <button id="tabSvc" onclick="switchTab('svc')">📋 ข้อมูลบริการ</button>
</div>

<div class="wrap">
  <div id="cfgNotice" class="cfgnotice hidden"></div>

  <!-- SOS TAB -->
  <div id="sosTab">
    <div id="sosList"><div class="empty">กำลังเชื่อมต่อ…</div></div>
  </div>

  <!-- SERVICES TAB -->
  <div id="svcTab" class="hidden">
    <button class="btn add" onclick="openSvcModal()">+ เพิ่มบริการใหม่</button>
    <div class="filter-bar" id="svcFilter"></div>
    <div id="svcList"></div>
  </div>
</div>

<!-- service edit modal -->
<div class="modal hidden" id="svcModal">
  <div class="modal-box">
    <h3 id="modalTitle">เพิ่มบริการ</h3>
    <label>หมวดหมู่</label>
    <select id="fCategory"></select>
    <label>ไอคอน (อิโมจิ)</label>
    <input id="fIcon" placeholder="🚑" maxlength="4">
    <label>ชื่อบริการ</label>
    <input id="fLabel" placeholder="เช่น รถพยาบาลฉุกเฉิน">
    <label>คำอธิบาย</label>
    <input id="fDesc" placeholder="เช่น สายด่วนกู้ชีพ">
    <label>ประเภทปุ่ม</label>
    <select id="fType">
      <option value="call">โทร (มีเบอร์)</option>
      <option value="pick">เลือก (ไม่มีเบอร์)</option>
      <option value="sos">ปุ่ม SOS</option>
    </select>
    <label>เบอร์โทร</label>
    <input id="fPhone" placeholder="เช่น 1669 หรือ 0812345678" inputmode="tel">
    <label>ลำดับการแสดง (น้อย=บนสุด)</label>
    <input id="fOrder" type="number" value="1" inputmode="numeric">
    <div class="modal-foot">
      <button class="btn cancel" onclick="closeSvcModal()">ยกเลิก</button>
      <button class="btn save" onclick="saveSvc()">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
  onSnapshot, query, orderBy, getDocs, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ============================================================
   🔧 กรอก Firebase config เดียวกับ index.html ตรงนี้
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCnnoEDRV4QCE70zHJJrPr3X5IFOP6SFXU",
  authDomain: "chuaylueakan.firebaseapp.com",
  databaseURL: "https://chuaylueakan-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chuaylueakan",
  storageBucket: "chuaylueakan.firebasestorage.app",
  messagingSenderId: "106101907072",
  appId: "1:106101907072:web:722845144aeb3660879065",
  measurementId: "G-VN0TZVB89H"
};

let db = null;
const CONFIGURED = !!firebaseConfig.projectId;
if (CONFIGURED){
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
} else {
  const n = document.getElementById('cfgNotice');
  n.classList.remove('hidden');
  n.innerHTML = "⚙️ <b>ยังไม่ได้กรอก Firebase config</b> — กรอกในไฟล์ admin.html (ชุดเดียวกับ index.html) เพื่อเริ่มรับเหตุจริงและแก้ข้อมูลบริการ";
}

const CAT_NAMES = {
  emergency:"🆘 ฉุกเฉิน", car:"🚗 รถเสีย & เดินทาง", worker:"🔧 หาคนช่วยงาน",
  community:"❤️ ชุมชนช่วยกัน", donate:"🩸 บริจาค & ทำดี", pet:"🐶 สัตว์เลี้ยง"
};
const STATUS_FLOW = [
  {key:"pending",label:"รอรับเรื่อง"},
  {key:"accepted",label:"รับเรื่องแล้ว"},
  {key:"enroute",label:"กำลังเดินทาง"},
  {key:"arrived",label:"ถึงที่เกิดเหตุ"},
  {key:"done",label:"เสร็จสิ้น"},
];
const STATUS_TH = Object.fromEntries(STATUS_FLOW.map(s=>[s.key,s.label]));

/* ---------------- TAB ---------------- */
function switchTab(t){
  document.getElementById('tabSos').classList.toggle('active', t==='sos');
  document.getElementById('tabSvc').classList.toggle('active', t==='svc');
  document.getElementById('sosTab').classList.toggle('hidden', t!=='sos');
  document.getElementById('svcTab').classList.toggle('hidden', t!=='svc');
  if(t==='svc') loadSvc();
}
window.switchTab = switchTab;

/* ---------------- SOS realtime ---------------- */
function fmtTime(ts){
  if(!ts) return "เมื่อสักครู่";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('th-TH',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
}

function renderSos(docs){
  const list = document.getElementById('sosList');
  const active = docs.filter(d=>d.data.status!=='done');
  const badge = document.getElementById('sosBadge');
  if(active.length){ badge.textContent=active.length; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');

  if(!docs.length){ list.innerHTML = '<div class="empty">ยังไม่มีเหตุ SOS เข้ามา<br>เมื่อมีผู้ใช้กดปุ่ม SOS เหตุจะปรากฏที่นี่ทันที</div>'; return; }
  list.innerHTML = "";
  docs.forEach(({id,data})=>{
    const st = data.status||'pending';
    const card = document.createElement('div');
    card.className = "sos-card "+st;
    const btns = STATUS_FLOW.map(s=>`<button class="${s.key===st?'on':''}" onclick="setStatus('${id}','${s.key}')">${s.label}</button>`).join('');
    card.innerHTML = `
      <div class="sos-head">
        <div><div class="sos-code">${data.code||id}</div><div class="sos-time">${fmtTime(data.createdAt)}</div></div>
        <span class="pill ${st}">${STATUS_TH[st]||st}</span>
      </div>
      <div class="sos-meta">
        📍 พิกัด: ${data.lat}, ${data.lng}
        &nbsp;·&nbsp;<a href="https://maps.google.com/?q=${data.lat},${data.lng}" target="_blank">เปิดแผนที่</a><br>
        ${data.locationLabel?('พื้นที่: '+data.locationLabel+(data.accurate?' (GPS แม่นยำ)':' (โดยประมาณ)')):''}
      </div>
      <div class="status-row">${btns}</div>
      <input class="note-input" placeholder="ข้อความถึงผู้แจ้ง (เช่น ทีมกำลังไป ~10 นาที / เบอร์ติดต่อ)" value="${data.helperInfo||''}" onchange="setNote('${id}',this.value)">
    `;
    list.appendChild(card);
  });
}

async function setStatus(id,status){
  if(!CONFIGURED){ toast('ต้องต่อ Firebase ก่อน'); return; }
  try{
    await updateDoc(doc(db,"sos_requests",id),{status,statusText:STATUS_TH[status]});
    toast('อัปเดตสถานะแล้ว');
  }catch(e){ console.error(e); toast('ผิดพลาด'); }
}
async function setNote(id,val){
  if(!CONFIGURED) return;
  try{ await updateDoc(doc(db,"sos_requests",id),{helperInfo:val}); toast('บันทึกข้อความแล้ว'); }
  catch(e){ console.error(e); }
}
window.setStatus=setStatus; window.setNote=setNote;

/* ---------------- SERVICES admin ---------------- */
let svcFilter = "all";
let svcCache = [];

function buildFilter(){
  const bar = document.getElementById('svcFilter');
  bar.innerHTML = `<button class="${svcFilter==='all'?'active':''}" onclick="setFilter('all')">ทั้งหมด</button>`+
    Object.entries(CAT_NAMES).map(([k,v])=>`<button class="${svcFilter===k?'active':''}" onclick="setFilter('${k}')">${v}</button>`).join('');
}
function setFilter(f){ svcFilter=f; buildFilter(); renderSvc(); }
window.setFilter=setFilter;

async function loadSvc(){
  buildFilter();
  if(!CONFIGURED){ document.getElementById('svcList').innerHTML='<div class="empty">ต่อ Firebase ก่อน จึงจะจัดการข้อมูลบริการได้</div>'; return; }
  document.getElementById('svcList').innerHTML='<div class="empty">กำลังโหลด…</div>';
  try{
    const snap = await getDocs(collection(db,"services"));
    svcCache = []; snap.forEach(d=>svcCache.push({id:d.id,...d.data()}));
    renderSvc();
  }catch(e){ console.error(e); document.getElementById('svcList').innerHTML='<div class="empty">โหลดไม่สำเร็จ</div>'; }
}
function renderSvc(){
  const list = document.getElementById('svcList');
  let arr = svcFilter==='all' ? svcCache : svcCache.filter(s=>s.category===svcFilter);
  arr.sort((a,b)=>(a.category||'').localeCompare(b.category||'')||(a.order||99)-(b.order||99));
  if(!arr.length){ list.innerHTML='<div class="empty">ยังไม่มีบริการ — กด “เพิ่มบริการใหม่”</div>'; return; }
  list.innerHTML="";
  arr.forEach(s=>{
    const el=document.createElement('div'); el.className="svc-card";
    el.innerHTML=`
      <div class="top"><span class="ico">${s.icon||'•'}</span>
        <span class="lbl">${s.label||'(ไม่มีชื่อ)'}</span>
        <span style="font-size:12px;color:var(--muted)">${CAT_NAMES[s.category]||s.category}</span>
      </div>
      ${s.desc?`<div class="desc">${s.desc}</div>`:''}
      ${s.phone?`<div class="ph">📞 ${s.phone}</div>`:''}
      <div class="svc-actions">
        <button class="btn edit" onclick="openSvcModal('${s.id}')">แก้ไข</button>
        <button class="btn del" onclick="delSvc('${s.id}','${(s.label||'').replace(/'/g,'')}')">ลบ</button>
      </div>`;
    list.appendChild(el);
  });
}

let editingId = null;
function openSvcModal(id){
  editingId = id||null;
  const sel=document.getElementById('fCategory');
  sel.innerHTML=Object.entries(CAT_NAMES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  if(id){
    const s=svcCache.find(x=>x.id===id)||{};
    document.getElementById('modalTitle').textContent="แก้ไขบริการ";
    fCategory.value=s.category||'emergency'; fIcon.value=s.icon||''; fLabel.value=s.label||'';
    fDesc.value=s.desc||''; fType.value=s.type||'call'; fPhone.value=s.phone||''; fOrder.value=s.order||1;
  }else{
    document.getElementById('modalTitle').textContent="เพิ่มบริการ";
    fCategory.value = svcFilter==='all'?'emergency':svcFilter;
    fIcon.value='';fLabel.value='';fDesc.value='';fType.value='call';fPhone.value='';fOrder.value=1;
  }
  document.getElementById('svcModal').classList.remove('hidden');
}
function closeSvcModal(){ document.getElementById('svcModal').classList.add('hidden'); }
window.openSvcModal=openSvcModal; window.closeSvcModal=closeSvcModal;

async function saveSvc(){
  if(!CONFIGURED){ toast('ต้องต่อ Firebase ก่อน'); return; }
  const data={
    category:fCategory.value, icon:fIcon.value.trim(), label:fLabel.value.trim(),
    desc:fDesc.value.trim(), type:fType.value, phone:fPhone.value.trim(),
    order:Number(fOrder.value)||1
  };
  if(!data.label){ toast('กรอกชื่อบริการก่อน'); return; }
  try{
    if(editingId) await updateDoc(doc(db,"services",editingId),data);
    else await addDoc(collection(db,"services"),data);
    closeSvcModal(); toast('บันทึกแล้ว'); loadSvc();
  }catch(e){ console.error(e); toast('บันทึกไม่สำเร็จ'); }
}
window.saveSvc=saveSvc;

async function delSvc(id,label){
  if(!confirm('ลบบริการ "'+label+'" ?')) return;
  try{ await deleteDoc(doc(db,"services",id)); toast('ลบแล้ว'); loadSvc(); }
  catch(e){ console.error(e); toast('ลบไม่สำเร็จ'); }
}
window.delSvc=delSvc;

/* ---------------- toast ---------------- */
let tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}
window.toast=toast;

/* ---------------- init ---------------- */
if(CONFIGURED){
  const q = query(collection(db,"sos_requests"), orderBy("createdAt","desc"));
  onSnapshot(q,(snap)=>{
    const docs=[]; snap.forEach(d=>docs.push({id:d.id,data:d.data()}));
    renderSos(docs);
  },(err)=>{
    console.error(err);
    document.getElementById('sosList').innerHTML='<div class="empty">เชื่อมต่อไม่สำเร็จ ตรวจสอบ config และ Firestore rules</div>';
  });
} else {
  document.getElementById('sosList').innerHTML='<div class="empty">โหมดทดลอง — ต่อ Firebase เพื่อรับเหตุจริง</div>';
}
</script>
</body>
</html>
